<!DOCTYPE html>
<html>
<head>
  <title>Packages</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="glass">
  <h1>The Trip Makers</h1>
</header>

<section class="section">
  <h2>Best Selling Packages</h2>

  <div class="cards">

    <div class="card hover">
      <img src="https://source.unsplash.com/400x300/?phuket">
      <h3>Thailand Tour</h3>
      <p>5D / 4N</p>
      <p class="price">₹35,999</p>
      <button onclick="enquire()">Book Now</button>
    </div>

    <div class="card hover">
      <img src="https://source.unsplash.com/400x300/?dubai,city">
      <h3>Dubai Luxury</h3>
      <p>4D / 3N</p>
      <p class="price">₹45,000</p>
      <button onclick="enquire()">Book Now</button>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
